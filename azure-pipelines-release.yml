# =============================================================================
# Azure Pipelines — リリース一式（ZIP + version.json）を FTPS で自動配置
#
# 手動実行のみ（trigger なし）。パラメータ releaseVersion を指定する。
#
# 流れ:
#   1) Windows: PyInstaller で goka_go / igo_admin をビルドし ZIP 化
#   2) Linux: ステージング領域へ FTPS（/staging/version.json と /staging/releases/*.zip）
#   3) Linux: 本番領域へ FTPS（/version.json と /releases/*.zip）
#
# 変数（FTP_* はシークレット推奨）:
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD … 必須
#   GOKA_FTP_REMOTE … 例 goka-igo.com/public_html
#   GOKA_FTP_TLS … 1=FTPS（既定）、0=平文
#
# 登録: Pipelines → 新規 → 既存の YAML → /azure-pipelines-release.yml
# =============================================================================

trigger: none
pr: none

parameters:
  - name: releaseVersion
    displayName: "リリース版（例 1.2.177）"
    type: string
    default: "1.2.177"
  - name: releaseNotes
    displayName: "release_notes（空なら v<version>）"
    type: string
    default: ""
  - name: stagingPathPrefix
    displayName: "ステージング用のパス接頭辞（FTP 上のサブフォルダ）"
    type: string
    default: "staging"

variables:
  PUBLIC_BASE: "https://goka-igo.com"

stages:
  - stage: Build
    displayName: Build release ZIPs
    jobs:
      - job: WindowsBuild
        pool:
          vmImage: windows-latest
        variables:
          PYTHONIOENCODING: utf-8
        steps:
          - checkout: self
            fetchDepth: 1

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"

          - script: pip install pyinstaller tksheet cryptography websockets pillow pygame
            displayName: Install build dependencies

          - script: pyinstaller goka_go.spec --noconfirm
            displayName: PyInstaller goka_go.spec

          - script: python tools/download_katago_for_windows_build.py
            displayName: Download KataGo (Windows)

          - script: python tools/copy_katago_into_dist.py
            displayName: Copy katago into dist/goka_go

          - script: pyinstaller igo_admin.spec --noconfirm
            displayName: PyInstaller igo_admin.spec

          - script: python tools/make_release_zips.py ${{ parameters.releaseVersion }} "$(Build.ArtifactStagingDirectory)/release"
            displayName: Create goka_go / goka_admin ZIPs

          # ── 軽量アップデート ZIP（KataGo 除外） ──
          - task: PythonScript@0
            inputs:
              scriptSource: "inline"
              script: |
                import os, zipfile

                ver = "${{ parameters.releaseVersion }}"
                release_dir = os.environ["BUILD_ARTIFACTSTAGINGDIRECTORY"] + "/release"
                full_zip = os.path.join(release_dir, f"goka_go_{ver}.zip")
                update_zip = os.path.join(release_dir, f"goka_go_update_{ver}.zip")

                with zipfile.ZipFile(full_zip, "r") as src, zipfile.ZipFile(update_zip, "w", zipfile.ZIP_DEFLATED) as dst:
                    for item in src.infolist():
                        if "/katago/" in item.filename:
                            continue
                        dst.writestr(item, src.read(item.filename))

                full_mb = os.path.getsize(full_zip) / 1024 / 1024
                update_mb = os.path.getsize(update_zip) / 1024 / 1024
                print(f"Full ZIP: {full_mb:.1f} MB, Update ZIP: {update_mb:.1f} MB")
            displayName: "Create lightweight update ZIP (no KataGo)"

          # ── 本番用 Inno Setup インストーラー ──
          - powershell: |
              choco install innosetup -y --no-progress
              $version = '${{ parameters.releaseVersion }}'
              $issFile = "installer/GokaGo_Setup.iss"
              (Get-Content $issFile) -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion   `"$version`"" | Set-Content $issFile
              & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issFile
              Write-Host "Production installer built: version $version"

              # Copy installer to release artifacts
              $exes = Get-ChildItem "dist/installer/GokaGo_Setup_*.exe"
              if ($exes.Count -gt 0) {
                  $dest = "$(Build.ArtifactStagingDirectory)/release"
                  Copy-Item $exes[0].FullName "$dest/GokaGo_Setup.exe"
                  $sizeMB = [math]::Round($exes[0].Length / 1MB, 1)
                  Write-Host "Installer: $sizeMB MB -> $dest/GokaGo_Setup.exe"
              }
            displayName: "Build Inno Setup production installer"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/release"
              artifact: "release-zips"
              publishLocation: "pipeline"
            displayName: Publish release artifacts

  - stage: Production
    displayName: Deploy production (FTP)
    dependsOn: Build
    jobs:
      - job: FtpProduction
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"

          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: "release-zips"
              targetPath: "$(Pipeline.Workspace)/release"

          # ── 本番 version.json + ZIPs をアップロード ──
          - script: |
              set -e
              VER='${{ parameters.releaseVersion }}'
              python tools/release_publish_ftp.py \
                --version "$VER" \
                --zip-go "$(Pipeline.Workspace)/release/goka_go_${VER}.zip" \
                --zip-admin "$(Pipeline.Workspace)/release/goka_admin_${VER}.zip" \
                --public-base "$(PUBLIC_BASE)" \
                --release-notes "${REL_NOTES}"
            displayName: FTP upload production version.json + ZIPs
            env:
              GOKA_FTP_HOST: $(FTP_SERVER)
              GOKA_FTP_USER: $(FTP_USERNAME)
              GOKA_FTP_PASS: $(FTP_PASSWORD)
              GOKA_FTP_REMOTE: $(GOKA_FTP_REMOTE)
              GOKA_FTP_TLS: $(GOKA_FTP_TLS)
              REL_NOTES: ${{ parameters.releaseNotes }}

          # ── 軽量アップデート ZIP もアップロード ──
          - script: |
              set -e
              VER='${{ parameters.releaseVersion }}'
              python tools/staging_ftp_upload.py \
                "$(Pipeline.Workspace)/release" \
                "releases"
            displayName: FTP upload lightweight update ZIP
            env:
              GOKA_FTP_HOST: $(FTP_SERVER)
              GOKA_FTP_USER: $(FTP_USERNAME)
              GOKA_FTP_PASS: $(FTP_PASSWORD)
              GOKA_FTP_REMOTE: $(GOKA_FTP_REMOTE)
              GOKA_FTP_TLS: $(GOKA_FTP_TLS)

          # ── Web ページを FTP アップロード（HPダウンロードリンク更新） ──
          - script: |
              set -e
              python tools/deploy_web_ftp.py
            displayName: FTP upload web pages (HP)
            env:
              GOKA_FTP_HOST: $(FTP_SERVER)
              GOKA_FTP_USER: $(FTP_USERNAME)
              GOKA_FTP_PASS: $(FTP_PASSWORD)
              GOKA_FTP_REMOTE: $(GOKA_FTP_REMOTE)
              GOKA_FTP_TLS: $(GOKA_FTP_TLS)

          # ── 配信確認 ──
          - script: |
              set -e
              echo "=== Production version.json ==="
              curl -fsS "$(PUBLIC_BASE)/version.json"
              echo
              echo "=== Installer check ==="
              curl -sI "$(PUBLIC_BASE)/releases/GokaGo_Setup.exe" | head -3
              echo "=== Update ZIP check ==="
              curl -sI "$(PUBLIC_BASE)/releases/goka_go_${{ parameters.releaseVersion }}.zip" | head -3
            displayName: Smoke test production files
