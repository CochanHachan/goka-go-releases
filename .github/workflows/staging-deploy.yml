name: Staging Deploy

on:
  # 手動トリガー（PRブランチを指定可能）
  workflow_dispatch:
    inputs:
      branch:
        description: 'デプロイするブランチ名（例: devin/xxx-fix-something）。空欄の場合はmain'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging-server:
    name: Deploy Staging Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy staging server (git pull + restart)
        shell: bash
        env:
          GOKA_ADMIN_TOKEN: ${{ secrets.GOKA_ADMIN_TOKEN }}
          GOKA_STAGING_URL: ${{ secrets.GOKA_STAGING_URL }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: |
          TOKEN="${GOKA_ADMIN_TOKEN:-goka-deploy-2026}"
          URL="${GOKA_STAGING_URL:-http://136.110.101.14:8000}"
          echo "Deploying staging server at ${URL} (branch: ${DEPLOY_BRANCH})..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Token: ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"${DEPLOY_BRANCH}\"}" \
            "${URL}/admin/update" \
            --connect-timeout 10 --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Staging server deploy triggered successfully."
          else
            echo "ERROR: Staging server deploy failed (HTTP ${HTTP_CODE})"
            exit 1
          fi

  build-staging-client:
    name: Build Staging Client
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller tksheet cryptography websockets pillow pygame

      - name: Switch to staging server URL
        shell: python
        run: |
          # -*- coding: utf-8 -*-
          import re, sys

          PROD_IP = "34.85.118.112"
          STAGING_IP = "136.110.101.14"
          errors = []

          # ---- igo/constants.py ----
          with open("igo/constants.py", "r", encoding="utf-8") as f:
              content = f.read()
          original = content

          # サーバーURL置換（純ASCII — エンコーディング問題なし）
          content = content.replace(
              'CLOUD_SERVER_URL = "ws://' + PROD_IP + ':8000"',
              'CLOUD_SERVER_URL = "ws://' + STAGING_IP + ':8000"'
          )
          content = content.replace(
              'API_BASE_URL     = "http://' + PROD_IP + ':8000"',
              'API_BASE_URL     = "http://' + STAGING_IP + ':8000"'
          )

          # APP_NAME に [STAGING] を追加（正規表現で日本語文字列に依存しない）
          content, n = re.subn(
              r'^(APP_NAME\s+=\s+".*?)"',
              r'\1 [STAGING]"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if n == 0:
              errors.append("APP_NAME replacement failed")

          # STAGING_LABEL 置換（純ASCII）
          content = content.replace(
              'STAGING_LABEL   = ""',
              'STAGING_LABEL   = "[STAGING] "'
          )

          # --- 検証 ---
          if STAGING_IP not in content:
              errors.append("constants.py: staging IP not found after replacement")
          if "[STAGING]" not in content:
              errors.append("constants.py: [STAGING] label not found after replacement")
          if PROD_IP in content:
              errors.append("constants.py: production IP still present after replacement")

          with open("igo/constants.py", "w", encoding="utf-8") as f:
              f.write(content)

          # 置換後の内容をログに出力（デバッグ用）
          print("=== constants.py (replaced) ===")
          for line in content.splitlines()[:15]:
              print(line)
          print("...")
          for line in content.splitlines():
              if "SERVER_URL" in line or "API_BASE" in line:
                  print(line)

          # ---- igo_admin.py ----
          with open("igo_admin.py", "r", encoding="utf-8") as f:
              admin_content = f.read()

          # URL置換（純ASCII）
          admin_content = admin_content.replace(
              'API_BASE_URL = "http://' + PROD_IP + ':8000"',
              'API_BASE_URL = "http://' + STAGING_IP + ':8000"'
          )

          # タイトルに [STAGING] 追加（正規表現で日本語文字列に依存しない）
          admin_content, n2 = re.subn(
              r'(self\.root\.title\("[^"]*?)"(\))',
              r'\1 [STAGING]"\2',
              admin_content,
              count=1,
          )
          if n2 == 0:
              errors.append("admin title replacement failed")

          # --- 検証 ---
          if PROD_IP in admin_content:
              errors.append("igo_admin.py: production IP still present")

          with open("igo_admin.py", "w", encoding="utf-8") as f:
              f.write(admin_content)

          print("\n=== igo_admin.py URL check ===")
          for line in admin_content.splitlines():
              if "API_BASE_URL" in line or "root.title" in line:
                  print(line)

          # --- エラーがあればビルドを失敗させる ---
          if errors:
              print("\nERROR: Replacement verification failed!")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("\nAll replacements verified successfully.")

      - name: Build client with PyInstaller
        run: pyinstaller goka_go.spec --noconfirm

      - name: Build admin panel with PyInstaller
        run: pyinstaller igo_admin.spec --noconfirm

      - name: Create staging ZIPs
        shell: python
        run: |
          import zipfile, os

          def create_zip(src, dst):
              with zipfile.ZipFile(dst, "w", zipfile.ZIP_DEFLATED) as zf:
                  for root, dirs, files in os.walk(src):
                      for f in files:
                          fp = os.path.join(root, f)
                          arcname = os.path.relpath(fp, src)
                          try:
                              zf.write(fp, arcname)
                          except PermissionError as e:
                              print(f"WARNING: Could not add {fp}: {e}")
              size_mb = os.path.getsize(dst) / (1024 * 1024)
              print(f"Created {dst} ({size_mb:.1f} MB)")

          # クライアント
          create_zip("dist/goka_go", "dist/goka_go_staging.zip")
          # 管理者画面
          create_zip("dist/igo_admin", "dist/igo_admin_staging.zip")

      - name: Upload staging client
        uses: actions/upload-artifact@v4
        with:
          name: goka-go-staging
          path: dist/goka_go_staging.zip
          retention-days: 7

      - name: Upload staging admin panel
        uses: actions/upload-artifact@v4
        with:
          name: goka-admin-staging
          path: dist/igo_admin_staging.zip
          retention-days: 7
