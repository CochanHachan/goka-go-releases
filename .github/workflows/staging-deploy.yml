name: Staging Deploy

on:
  # 手動トリガー（PRブランチを指定可能）
  workflow_dispatch:
    inputs:
      branch:
        description: 'デプロイするブランチ名（例: devin/xxx-fix-something）。空欄の場合はmain'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging-server:
    name: Deploy Staging Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy staging server (git pull + restart)
        shell: bash
        env:
          GOKA_ADMIN_TOKEN: ${{ secrets.GOKA_ADMIN_TOKEN }}
          GOKA_STAGING_URL: ${{ secrets.GOKA_STAGING_URL }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: |
          TOKEN="${GOKA_ADMIN_TOKEN:-goka-deploy-2026}"
          URL="${GOKA_STAGING_URL:-http://136.110.101.14:8000}"
          echo "Deploying staging server at ${URL} (branch: ${DEPLOY_BRANCH})..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Token: ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"${DEPLOY_BRANCH}\"}" \
            "${URL}/admin/update" \
            --connect-timeout 10 --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Staging server deploy triggered successfully."
          else
            echo "ERROR: Staging server deploy failed (HTTP ${HTTP_CODE})"
            exit 1
          fi

  build-staging-client:
    name: Build Staging Client
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller tksheet cryptography websockets pillow pygame

      - name: Switch to staging environment
        shell: python
        run: |
          import sys

          # constants_env.py の _ENV フラグを "staging" に切り替える。
          # constants.py と igo_admin.py は共に constants_env.py から _ENV を
          # import しているので、この1ファイルの変更だけで全設定が連動する。
          ENV_FILE = "igo/constants_env.py"
          SEARCH   = '_ENV = "production"'
          REPLACE  = '_ENV = "staging"'

          errors = []

          with open(ENV_FILE, "r", encoding="utf-8") as f:
              content = f.read()

          if SEARCH not in content:
              print(f"ERROR: '{SEARCH}' not found in {ENV_FILE}")
              print(f"File contents:\n{content}")
              sys.exit(1)

          content = content.replace(SEARCH, REPLACE, 1)

          with open(ENV_FILE, "w", encoding="utf-8") as f:
              f.write(content)

          print(f"{ENV_FILE}: switched to staging")

          # --- 検証1: constants_env.py を import して _ENV を確認 ---
          sys.path.insert(0, ".")
          from igo.constants_env import _ENV as env_val
          print(f"\nconstants_env.py: _ENV = {env_val!r}")
          if env_val != "staging":
              errors.append("constants_env.py: _ENV is not 'staging'")

          # --- 検証2: constants.py を import して全定数を確認 ---
          from igo.constants import _ENV as c_env, CLOUD_SERVER_URL, API_BASE_URL, STAGING_LABEL, APP_NAME
          print(f"\nconstants.py verification:")
          print(f"  _ENV             = {c_env!r}")
          print(f"  CLOUD_SERVER_URL = {CLOUD_SERVER_URL!r}")
          print(f"  API_BASE_URL     = {API_BASE_URL!r}")
          print(f"  STAGING_LABEL    = {STAGING_LABEL!r}")
          print(f"  APP_NAME         = {APP_NAME!r}")

          if c_env != "staging":
              errors.append("constants.py: _ENV is not 'staging'")
          if "136.110.101.14" not in CLOUD_SERVER_URL:
              errors.append("constants.py: CLOUD_SERVER_URL does not point to staging")
          if "136.110.101.14" not in API_BASE_URL:
              errors.append("constants.py: API_BASE_URL does not point to staging")
          if "[STAGING]" not in STAGING_LABEL:
              errors.append("constants.py: STAGING_LABEL missing [STAGING]")

          # --- 検証3: igo_admin.py が constants_env から _ENV を import しているか ---
          with open("igo_admin.py", "r", encoding="utf-8") as f:
              admin_text = f.read()
          if "from igo.constants_env import _ENV" not in admin_text:
              errors.append("igo_admin.py: does not import _ENV from constants_env")

          print(f"\nigo_admin.py: imports constants_env = {'from igo.constants_env import _ENV' in admin_text}")

          if errors:
              print("\nERROR: Verification failed!")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("\nAll verifications passed.")

      - name: Build client with PyInstaller
        run: pyinstaller goka_go.spec --noconfirm

      - name: Build admin panel with PyInstaller
        run: pyinstaller igo_admin.spec --noconfirm

      - name: Create staging ZIPs
        shell: python
        run: |
          import zipfile, os

          def create_zip(src, dst):
              with zipfile.ZipFile(dst, "w", zipfile.ZIP_DEFLATED) as zf:
                  for root, dirs, files in os.walk(src):
                      for f in files:
                          fp = os.path.join(root, f)
                          arcname = os.path.relpath(fp, src)
                          try:
                              zf.write(fp, arcname)
                          except PermissionError as e:
                              print(f"WARNING: Could not add {fp}: {e}")
              size_mb = os.path.getsize(dst) / (1024 * 1024)
              print(f"Created {dst} ({size_mb:.1f} MB)")

          # クライアント
          create_zip("dist/goka_go", "dist/goka_go_staging.zip")
          # 管理者画面
          create_zip("dist/igo_admin", "dist/igo_admin_staging.zip")

      - name: Upload staging client
        uses: actions/upload-artifact@v4
        with:
          name: goka-go-staging
          path: dist/goka_go_staging.zip
          retention-days: 7

      - name: Upload staging admin panel
        uses: actions/upload-artifact@v4
        with:
          name: goka-admin-staging
          path: dist/igo_admin_staging.zip
          retention-days: 7
