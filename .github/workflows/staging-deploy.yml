name: Staging Deploy

on:
  # 手動トリガー（PRブランチを指定可能）
  workflow_dispatch:
    inputs:
      branch:
        description: 'デプロイするブランチ名（例: devin/xxx-fix-something）。空欄の場合はmain'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging-server:
    name: Deploy Staging Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy staging server (git pull + restart)
        shell: bash
        env:
          GOKA_ADMIN_TOKEN: ${{ secrets.GOKA_ADMIN_TOKEN }}
          GOKA_STAGING_URL: ${{ secrets.GOKA_STAGING_URL }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: |
          TOKEN="${GOKA_ADMIN_TOKEN:-goka-deploy-2026}"
          URL="${GOKA_STAGING_URL:-http://136.110.101.14:8000}"
          echo "Deploying staging server at ${URL} (branch: ${DEPLOY_BRANCH})..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Token: ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"${DEPLOY_BRANCH}\"}" \
            "${URL}/admin/update" \
            --connect-timeout 10 --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Staging server deploy triggered successfully."
          else
            echo "ERROR: Staging server deploy failed (HTTP ${HTTP_CODE})"
            exit 1
          fi

  build-staging-client:
    name: Build Staging Client
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller tksheet cryptography websockets pillow pygame

      - name: Switch to staging environment
        shell: python
        run: |
          import sys

          # constants_env.py の _ENV フラグを "staging" に切り替える。
          # constants.py と igo_admin.py は共に constants_env.py から _ENV を
          # import しているので、この1ファイルの変更だけで全設定が連動する。
          ENV_FILE = "igo/constants_env.py"
          SEARCH   = '_ENV = "production"'
          REPLACE  = '_ENV = "staging"'

          errors = []

          with open(ENV_FILE, "r", encoding="utf-8") as f:
              content = f.read()

          if SEARCH not in content:
              print(f"ERROR: '{SEARCH}' not found in {ENV_FILE}")
              print(f"File contents:\n{content}")
              sys.exit(1)

          content = content.replace(SEARCH, REPLACE, 1)

          with open(ENV_FILE, "w", encoding="utf-8") as f:
              f.write(content)

          print(f"{ENV_FILE}: switched to staging")

          # --- 検証1: constants_env.py を import して _ENV を確認 ---
          sys.path.insert(0, ".")
          from igo.constants_env import _ENV as env_val
          print(f"\nconstants_env.py: _ENV = {env_val!r}")
          if env_val != "staging":
              errors.append("constants_env.py: _ENV is not 'staging'")

          # --- 検証2: constants.py を import して全定数を確認 ---
          from igo.constants import _ENV as c_env, CLOUD_SERVER_URL, API_BASE_URL, STAGING_LABEL, APP_NAME
          print(f"\nconstants.py verification:")
          print(f"  _ENV             = {c_env!r}")
          print(f"  CLOUD_SERVER_URL = {CLOUD_SERVER_URL!r}")
          print(f"  API_BASE_URL     = {API_BASE_URL!r}")
          print(f"  STAGING_LABEL    = {STAGING_LABEL!r}")
          print(f"  APP_NAME         = {APP_NAME!r}")

          if c_env != "staging":
              errors.append("constants.py: _ENV is not 'staging'")
          if "136.110.101.14" not in CLOUD_SERVER_URL:
              errors.append("constants.py: CLOUD_SERVER_URL does not point to staging")
          if "136.110.101.14" not in API_BASE_URL:
              errors.append("constants.py: API_BASE_URL does not point to staging")
          if "[STAGING]" not in STAGING_LABEL:
              errors.append("constants.py: STAGING_LABEL missing [STAGING]")

          # --- 検証3: igo_admin.py が constants_env から _ENV を import しているか ---
          with open("igo_admin.py", "r", encoding="utf-8") as f:
              admin_text = f.read()
          if "from igo.constants_env import _ENV" not in admin_text:
              errors.append("igo_admin.py: does not import _ENV from constants_env")

          print(f"\nigo_admin.py: imports constants_env = {'from igo.constants_env import _ENV' in admin_text}")

          if errors:
              print("\nERROR: Verification failed!")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("\nAll verifications passed.")

      - name: Download KataGo
        shell: python
        run: |
          import urllib.request, zipfile, gzip, shutil, os

          # KataGo OpenCL Windows x64 バイナリ
          katago_url = "https://github.com/lightvector/KataGo/releases/download/v1.16.4/katago-v1.16.4-opencl-windows-x64.zip"
          katago_zip = "katago-opencl.zip"
          print(f"Downloading KataGo binary from {katago_url}...")
          urllib.request.urlretrieve(katago_url, katago_zip)

          os.makedirs("katago", exist_ok=True)
          with zipfile.ZipFile(katago_zip, "r") as zf:
              for member in zf.infolist():
                  name = member.filename
                  if name.endswith((".exe", ".dll", ".cfg", ".pem")):
                      member.filename = os.path.basename(name)
                      zf.extract(member, "katago")
                      print(f"  Extracted: {member.filename}")

          # KataGo ニューラルネットモデル
          model_url = "https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-b28c512nbt-s12763923712-d5805955894.bin.gz"
          model_gz = "model.bin.gz"
          print(f"Downloading KataGo model from {model_url}...")
          req = urllib.request.Request(model_url, headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          with urllib.request.urlopen(req) as resp, open(model_gz, "wb") as out:
              shutil.copyfileobj(resp, out)

          with gzip.open(model_gz, "rb") as f_in:
              with open(os.path.join("katago", "model.bin"), "wb") as f_out:
                  shutil.copyfileobj(f_in, f_out)
          print(f"  Extracted: model.bin ({os.path.getsize(os.path.join('katago', 'model.bin')) / (1024*1024):.1f} MB)")

          # Human SL モデル（humanSLProfile 用）
          human_url = "https://github.com/lightvector/KataGo/releases/download/v1.15.0/b18c384nbt-humanv0.bin.gz"
          human_gz = "human_model.bin.gz"
          print(f"Downloading KataGo Human SL model from {human_url}...")
          urllib.request.urlretrieve(human_url, human_gz)

          with gzip.open(human_gz, "rb") as f_in:
              with open(os.path.join("katago", "human_model.bin"), "wb") as f_out:
                  shutil.copyfileobj(f_in, f_out)
          print(f"  Extracted: human_model.bin ({os.path.getsize(os.path.join('katago', 'human_model.bin')) / (1024*1024):.1f} MB)")

          # KataGoData フォルダ作成
          os.makedirs(os.path.join("katago", "KataGoData"), exist_ok=True)
          with open(os.path.join("katago", "KataGoData", ".keep"), "w") as f:
              f.write("")

          print("KataGo setup complete.")
          for fn in sorted(os.listdir("katago")):
              fp = os.path.join("katago", fn)
              if os.path.isfile(fp):
                  print(f"  {fn}: {os.path.getsize(fp) / (1024*1024):.2f} MB")

      - name: Build client with PyInstaller
        run: pyinstaller goka_go.spec --noconfirm

      - name: Build admin panel with PyInstaller
        run: pyinstaller igo_admin.spec --noconfirm

      - name: Copy KataGo into dist folder
        shell: python
        run: |
          import shutil, os

          # PyInstaller の出力フォルダに KataGo ファイルをコピー
          # 本番ビルドでは Inno Setup が別途バンドルするが、
          # ステージングでは PyInstaller + ZIP なので手動コピーが必要
          src = "katago"
          dst = os.path.join("dist", "goka_go", "katago")
          if os.path.isdir(src):
              shutil.copytree(src, dst, dirs_exist_ok=True)
              print(f"Copied {src} -> {dst}")
              for fn in sorted(os.listdir(dst)):
                  fp = os.path.join(dst, fn)
                  if os.path.isfile(fp):
                      print(f"  {fn}: {os.path.getsize(fp) / (1024*1024):.2f} MB")
          else:
              print(f"WARNING: {src} not found, KataGo will not be available")

      - name: Create staging ZIPs
        shell: python
        run: |
          import os
          import shutil

          def create_zip(src_dir, dst_zip):
              # NOTE:
              # PyInstaller の onedir 出力には `_tk_data/` のような「空ディレクトリ」が含まれる。
              # zipfile で手組みすると dirs が無視され、展開後に Tcl/Tk ランタイムが欠落して起動失敗する。
              # shutil.make_archive は空ディレクトリも含めてアーカイブできる。
              base_dir = os.path.dirname(os.path.abspath(src_dir))
              base_name = os.path.join(os.path.dirname(os.path.abspath(dst_zip)), "_tmp_archive")
              shutil.make_archive(base_name, "zip", root_dir=base_dir, base_dir=os.path.basename(src_dir))
              tmp_zip = base_name + ".zip"
              os.replace(tmp_zip, dst_zip)
              size_mb = os.path.getsize(dst_zip) / (1024 * 1024)
              print(f"Created {dst_zip} ({size_mb:.1f} MB)")

          # クライアント
          create_zip("dist/goka_go", "dist/goka_go_staging.zip")
          # 管理者画面
          create_zip("dist/igo_admin", "dist/igo_admin_staging.zip")

      - name: Upload staging client
        uses: actions/upload-artifact@v4
        with:
          name: goka-go-staging
          path: dist/goka_go_staging.zip
          retention-days: 7

      - name: Upload staging admin panel
        uses: actions/upload-artifact@v4
        with:
          name: goka-admin-staging
          path: dist/igo_admin_staging.zip
          retention-days: 7
