name: eSigner Auth Diagnostic v3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/esigner-auth-test.yml'

jobs:
  diagnose:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1
    steps:
      - name: "Step 0 - Verify OAuth2 Endpoint (demo credentials)"
        shell: python
        run: |
          import sys, json, urllib.request, urllib.parse, urllib.error
          sys.stdout.reconfigure(encoding='utf-8')

          print("=== OAuth2 Endpoint Health Check (demo credentials) ===")
          token_url = "https://login.ssl.com/oauth2/token"
          client_id = "kaXTRACNijSWsFdRKg_KAfD3fqrBlzMbWs6TwWHwAn8"

          # Try with known demo credentials (should fail with specific error if endpoint is up)
          data = urllib.parse.urlencode({
              "grant_type": "password",
              "username": "esigner_demo",
              "password": "esignerDemo#1",
              "client_id": client_id,
          }).encode()

          req = urllib.request.Request(token_url, data=data, method="POST")
          req.add_header("Content-Type", "application/x-www-form-urlencoded")

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print("OK: Demo auth succeeded - endpoint is working")
                  print("Note: demo creds work on PROD endpoint too (limited scope)")
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"HTTP {e.code}: {error_body[:300]}")
              if e.code == 400:
                  try:
                      err = json.loads(error_body)
                      desc = err.get("error_description", "")
                      if "grant" in desc.lower():
                          print("OK: Endpoint is responding (demo creds rejected as expected on PROD)")
                      else:
                          print(f"Endpoint responded with: {desc}")
                  except:
                      pass
              elif e.code >= 500:
                  print("FAIL: OAuth2 endpoint itself is having issues (server error)")
                  sys.exit(1)
          except Exception as e:
              print(f"FAIL: Cannot reach OAuth2 endpoint: {e}")
              sys.exit(1)

      - name: "Step 1 - Secret Format Check"
        shell: python
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
          CREDENTIAL_ID: ${{ secrets.CREDENTIAL_ID }}
        run: |
          import os, sys, re, base64
          sys.stdout.reconfigure(encoding='utf-8')

          print("=== All Secrets Format Check ===")

          username = os.environ.get("ES_USERNAME", "")
          password = os.environ.get("ES_PASSWORD", "")
          totp_secret = os.environ.get("ES_TOTP_SECRET", "")
          cred_id = os.environ.get("CREDENTIAL_ID", "")

          # Username
          if username:
              masked = username[:3] + "***" + username[-3:] if len(username) > 6 else "***"
              print(f"ES_USERNAME: SET ({len(username)} chars, hint: {masked})")
              if "@" in username:
                  print("  -> Looks like an email address (expected)")
              else:
                  print("  -> WARNING: Does not contain '@'. SSL.com username is usually an email.")
          else:
              print("ES_USERNAME: NOT SET")
              sys.exit(1)

          # Password
          if password:
              print(f"ES_PASSWORD: SET ({len(password)} chars)")
              if len(password) < 6:
                  print("  -> WARNING: Very short password")
          else:
              print("ES_PASSWORD: NOT SET")
              sys.exit(1)

          # TOTP Secret
          if totp_secret:
              is_base32 = bool(re.fullmatch(r'[A-Z2-7=]+', totp_secret, re.IGNORECASE))
              is_base64 = bool(re.fullmatch(r'[A-Za-z0-9+/=]+', totp_secret))
              if is_base32 and len(totp_secret) >= 16:
                  fmt = "Base32"
              elif is_base64 and len(totp_secret) >= 20:
                  fmt = "Base64"
              elif len(totp_secret) == 6 and totp_secret.isdigit():
                  fmt = "6-DIGIT OTP (WRONG! Need secret key, not OTP code)"
              else:
                  fmt = f"Unknown"
              print(f"ES_TOTP_SECRET: SET ({len(totp_secret)} chars, format: {fmt})")
          else:
              print("ES_TOTP_SECRET: NOT SET")
              sys.exit(1)

          # Credential ID
          if cred_id:
              print(f"CREDENTIAL_ID: SET ({len(cred_id)} chars)")
          else:
              print("CREDENTIAL_ID: NOT SET")

          # TOTP generation test
          try:
              import hmac, hashlib, struct, time
              try:
                  key = base64.b32decode(totp_secret + '=' * (-len(totp_secret) % 8), casefold=True)
                  dm = "Base32"
              except:
                  key = base64.b64decode(totp_secret)
                  dm = "Base64"
              counter = struct.pack(">Q", int(time.time()) // 30)
              mac = hmac.new(key, counter, hashlib.sha1).digest()
              offset = mac[-1] & 0x0F
              code = struct.unpack(">I", mac[offset:offset + 4])[0] & 0x7FFFFFFF
              totp = str(code % 1000000).zfill(6)
              print(f"TOTP code generation: OK ({dm} decode) -> {totp}")
          except Exception as e:
              print(f"TOTP code generation: FAIL ({e})")
              sys.exit(1)

      - name: "Step 2 - OAuth2 Full Auth Test"
        shell: python
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: |
          import os, sys, json, urllib.request, urllib.parse, urllib.error
          import hmac, hashlib, struct, time, base64
          sys.stdout.reconfigure(encoding='utf-8')

          username = os.environ.get("ES_USERNAME", "")
          password = os.environ.get("ES_PASSWORD", "")
          totp_secret = os.environ.get("ES_TOTP_SECRET", "")

          # Generate TOTP
          try:
              try:
                  key = base64.b32decode(totp_secret + '=' * (-len(totp_secret) % 8), casefold=True)
              except:
                  key = base64.b64decode(totp_secret)
              counter = struct.pack(">Q", int(time.time()) // 30)
              mac = hmac.new(key, counter, hashlib.sha1).digest()
              offset = mac[-1] & 0x0F
              code = struct.unpack(">I", mac[offset:offset + 4])[0] & 0x7FFFFFFF
              totp = str(code % 1000000).zfill(6)
          except Exception as e:
              print(f"FAIL: TOTP error: {e}")
              sys.exit(1)

          token_url = "https://login.ssl.com/oauth2/token"
          client_id = "kaXTRACNijSWsFdRKg_KAfD3fqrBlzMbWs6TwWHwAn8"

          # Test A: Full auth (username + password + TOTP)
          print("=== Test A: Full auth (username + password + TOTP) ===")
          data = urllib.parse.urlencode({
              "grant_type": "password",
              "username": username,
              "password": password,
              "client_id": client_id,
              "totp": totp,
          }).encode()
          req = urllib.request.Request(token_url, data=data, method="POST")
          req.add_header("Content-Type", "application/x-www-form-urlencoded")
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = json.loads(resp.read().decode())
                  print(f"OK: Full auth succeeded! token_type={body.get('token_type')}")
          except urllib.error.HTTPError as e:
              err_body = e.read().decode()
              try:
                  err = json.loads(err_body)
                  desc = err.get("error_description", err.get("error", "unknown"))
              except:
                  desc = err_body[:300]
              print(f"FAIL: HTTP {e.code}: {desc}")
              # Don't exit - continue to test B
          except Exception as e:
              print(f"FAIL: {e}")

          # Test B: Password only (no TOTP)
          print("\n=== Test B: Password only (no TOTP) ===")
          data2 = urllib.parse.urlencode({
              "grant_type": "password",
              "username": username,
              "password": password,
              "client_id": client_id,
          }).encode()
          req2 = urllib.request.Request(token_url, data=data2, method="POST")
          req2.add_header("Content-Type", "application/x-www-form-urlencoded")
          try:
              with urllib.request.urlopen(req2, timeout=30) as resp:
                  print("OK: Password-only auth succeeded")
          except urllib.error.HTTPError as e:
              err_body = e.read().decode()
              try:
                  err = json.loads(err_body)
                  desc = err.get("error_description", err.get("error", "unknown"))
              except:
                  desc = err_body[:300]
              print(f"Result: HTTP {e.code}: {desc}")
              if "totp" in desc.lower() or "otp" in desc.lower():
                  print("-> Password OK, TOTP required (expected)")
                  print("DIAGNOSIS: ES_PASSWORD is CORRECT. Problem is ES_TOTP_SECRET.")
              elif "invalid" in desc.lower() and "grant" in desc.lower():
                  print("-> Password also rejected without TOTP")
                  print("DIAGNOSIS: ES_PASSWORD is WRONG or account disabled/expired.")
                  print("ACTION: Verify you can login at https://login.ssl.com with this email+password")
                  print("ACTION: If password was recently changed, make sure GitHub Secrets was updated with the EXACT new password (no extra spaces)")
              else:
                  print(f"-> Unexpected response")
          except Exception as e:
              print(f"Error: {e}")

          # Test C: Wrong password sanity check
          print("\n=== Test C: Sanity check with known-bad password ===")
          data3 = urllib.parse.urlencode({
              "grant_type": "password",
              "username": username,
              "password": "definitely_wrong_password_12345",
              "client_id": client_id,
          }).encode()
          req3 = urllib.request.Request(token_url, data=data3, method="POST")
          req3.add_header("Content-Type", "application/x-www-form-urlencoded")
          try:
              with urllib.request.urlopen(req3, timeout=30) as resp:
                  print("UNEXPECTED: Wrong password accepted?!")
          except urllib.error.HTTPError as e:
              err_body = e.read().decode()
              try:
                  err = json.loads(err_body)
                  desc = err.get("error_description", err.get("error", "unknown"))
              except:
                  desc = err_body[:300]
              print(f"HTTP {e.code}: {desc}")
              print("-> This is expected (wrong password should fail)")
              print("If Test B gave the SAME error as Test C, your password in Secrets is wrong.")
          except Exception as e:
              print(f"Error: {e}")

          print("\n=== SUMMARY ===")
          print("If Test A & B both fail with 'grant invalid' but Test C also shows same error:")
          print("  -> ES_PASSWORD stored in GitHub Secrets is incorrect")
          print("  -> Double-check: no leading/trailing spaces, correct copy-paste")
          print("If Test B shows 'TOTP required' but Test A fails:")
          print("  -> ES_TOTP_SECRET is the problem (secret key wrong or rotated)")
