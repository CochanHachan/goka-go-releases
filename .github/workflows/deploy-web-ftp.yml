# 碁華サイト web/ を Xserver 等の FTP(S) へデプロイする。
# GitHub Pages 用の deploy-web.yml とは別。本番ドメインが Xserver のとき向け。
#
# リポジトリ Secrets（Settings → Secrets and variables → Actions）に設定:
#   FTP_SERVER       FTP サーバー名（例: sv1234.xserver.jp）
#   FTP_USERNAME     FTP ユーザー名
#   FTP_PASSWORD     FTP パスワード
#
# アドオン独自ディレクトリなどで public_html 以外に出す場合は、
# 下の server-dir を編集するか、SamKirkland/FTP-Deploy-Action の issue を参照。


name: Deploy Web to FTP (Xserver)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-ftp.yml"

  workflow_dispatch:

concurrency:
  group: deploy-web-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy web/ via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./web/
          # このワークフローはエックスサーバー上の「アクセス先ディレクトリ = public_html」
          # で作られたサブFTPアカウント（例: web-deploy@goka-igo.com）を前提とする。
          # この種のアカウントは chroot されていて、FTP ログイン直後の「/」が
          # すでに該当ドメインの public_html を指す。よってここは「/」固定で正しい。
          #
          # もしメイン FTP アカウント（xs548778 のような chroot されていないアカウント）
          # を使うケースに切り替える場合は、ここを "goka-igo.com/public_html/" のように
          # 明示的に書き換えること。
          server-dir: /
          # リモートにあってローカルに無いファイルは削除しない（安全側）
          dangerous-clean-slate: false


