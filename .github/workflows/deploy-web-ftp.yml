# 碁華サイト web/ を Xserver 等の FTP(S) へデプロイする。
# GitHub Pages 用の deploy-web.yml とは別。本番ドメインが Xserver のとき向け。
#
# リポジトリ Secrets（Settings → Secrets and variables → Actions）に設定:
#   FTP_SERVER       FTP サーバー名（例: sv1234.xserver.jp）
#   FTP_USERNAME     FTP ユーザー名
#   FTP_PASSWORD     FTP パスワード
#
# アドオン独自ディレクトリなどで public_html 以外に出す場合は、
# 下の server-dir を編集するか、SamKirkland/FTP-Deploy-Action の issue を参照。
#   CLOUDFLARE_API_TOKEN  Cloudflare で「キャッシュの消去」権限の API トークン
#   CLOUDFLARE_ZONE_ID    ゾーン ID（ダッシュボード右サイドバー）
#
# Cloudflare 経由で配信している場合、デプロイ後にキャッシュパージしないと古い HTML が残ることがあります。
# トークン・ゾーン ID を両方設定すると、FTP 成功後に purge_everything を実行します。

name: Deploy Web to FTP (Xserver)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-ftp.yml"

  workflow_dispatch:

concurrency:
  group: deploy-web-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy web/ via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./web/
          # エックスサーバー標準: FTP ログイン先から見た public_html
          # SamKirkland/FTP-Deploy-Action は server-dir に末尾スラッシュが必須
          server-dir: public_html/
          # リモートにあってローカルに無いファイルは削除しない（安全側）
          dangerous-clean-slate: false

      - name: Purge Cloudflare cache (optional)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ZONE" ]; then
            echo "Skipping Cloudflare purge (set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ZONE_ID to enable)."
            exit 0
          fi
          echo "Purging Cloudflare cache for zone ${CF_ZONE}..."
          RESP=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "$BODY"
          if [ "$CODE" != "200" ]; then
            echo "Cloudflare API HTTP $CODE"
            exit 1
          fi
          echo "$BODY" | grep -q '"success":true' || exit 1
          echo "Cloudflare purge OK."
